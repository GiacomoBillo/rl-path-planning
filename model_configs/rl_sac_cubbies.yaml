# Data
data_dir: /workspace/datasets/ae_aristotle1_5mm_cubbies
train_trajectory_key: "global_solutions"
val_trajectory_key: "global_solutions"
num_obstacle_points: 4096
num_target_points: 128
num_workers: 0

# Robot & environment
urdf_path: /workspace/assets/panda/panda.urdf
num_robot_points: 2048
action_chunk_length: 1

# Environment
env:
  terminate_ep_on_collision: true  # Whether to end the episode immediately upon collision
  action_delta_clip: 0.2  # Hard clip joint deltas
  # Reward = total_magnitude * sum(terms). Keep optional terms at 0.0 to disable.
  reward: 
    total_magnitude: 1.0
    goal_weight: 1.0                     # >= 0
    collision_weight: -1.0              # <= 0
    goal_distance_weight: 0.0           # >= 0 (gaussian dense term)
    goal_distance_progress_weight: 0.0     # >= 0 (progress shaping)
    orientation_position_weight: 0.0      # >= 0 (balance position vs orientation in goal distance)
    step_penalty_weight: 0.0            # <= 0
    action_l2_weight: 0.0               # <= 0
    joint_limit_weight: 0.0             # <= 0
    sdf_obstacle_weight: 0.0            # <= 0
    sdf_obstacle_threshold: 0.0         # >= 0 (margin where penalty starts)
    sdf_obstacle_max_penalty: 0.0       # >= 0 (clamp)
    sdf_self_collision_weight: 0.0      # <= 0
    sdf_self_collision_threshold: 0.0   # >= 0 (margin where penalty starts)
    sdf_self_collision_max_penalty: 0.0 # >= 0 (clamp)

  vec_env_type: "subproc"            # "dummy" | "subproc"
  n_envs: 6                        # Default env count when role-specific values are omitted
  # train_n_envs: 1
  # eval_n_envs: 1
  # subproc_start_method: null       # null = SB3 default ("forkserver"/"spawn" depending on platform)
  num_workers: 0                   # DataLoader workers per env process
  subproc_dataset_num_workers: 0   # Conservative default to avoid nested multiprocessing

# BC checkpoint (pre-trained AvoidEverything policy, for warm-start)
# bc_checkpoint_parameters are baked into the checkpoint — they must match the architecture used during training and cannot be changed independently.
# no need to change them because we are just loading the checkpoint, changing them could break the loading
bc_checkpoint_path: /workspace/checkpoints/avoid_everything_cubby.ckpt
bc_checkpoint_parameters: 
  robot_dof: 7
  point_match_loss_weight: 1
  collision_loss_weight: 5
  collision_loss_margin: 0.03
  min_lr: 1.0e-5
  max_lr: 5.0e-5
  warmup_steps: 5000
  decay_rate: null
  pc_bounds: [[-1.5, -1.5, -0.1], [1.5, 1.5, 1.5]]
  train_batch_size: 10
  disable_viz: true

# SAC / RL
freeze_bc_encoder: true  # Freeze BC encoder during initial RL training; call extractor.unfreeze() to fine-tune end-to-end
seed: 42  # Single seed source for both SB3 model and VecEnv seeding
n_eval_episodes: 10
save_dir: ./checkpoints  # Base directory for checkpoints (structure: save_dir/experiment_group/timestamp_phase.zip)
buffer_size: 1000
batch_size: 16  # Increased from 1 to reduce gradient variance
train_freq: [1, "step"] # int | Tuple[int, str] , Update the model every ... (n, "step") or (n, "episode")
gradient_steps: 1  # Number of gradient updates to perform after each train_freq

# Prefill buffer with current policy rollouts
transitions_before_learn: 200  # Prefill replay buffer with transitions before learn()
prefill_deterministic: false  # Use deterministic actions during replay prefill
prefill_render: true

# SAC hyperparameters for stochasticity
entropy_coef: "0.001" # 0.01  # Low entropy to preserve BC behavior (default='auto' is too high)
log_std_init: -10 
target_entropy: -30  # Target entropy for 'auto' entropy coefficient tuning 


# --- Learning rate schedules for different training phases ---
# Supports two schedule types:
#   - constant: Fixed learning rate throughout the phase
#   - linear: Linear decay from start_lr to end_lr

# Critic warmup phase (actor frozen, critic trains on BC rollouts):
critic_warmup_steps: 1000
critic_warmup_lr:
  type: "linear"       # "constant" or "linear"
  start_lr: 3.0e-4       # Learning rate during warmup
  end_lr: 0       # Only used if type is "linear"

# RL finetuning phase (both actor and critic train):
total_timesteps: 1000
finetuning_actor_lr:
  type: "linear"         # "constant" or "linear"
  start_lr: 1.0e-5       # Initial learning rate
  end_lr: 0         # Final learning rate (for linear decay)

finetuning_critic_lr:
  type: "constant"       # "constant" or "linear"
  start_lr: 3.0e-5       # Learning rate during finetuning
  # end_lr: 1.0e-5       # Only used if type is "linear"


# --- Logging configuration ---
# Configures multi-format logging for training metrics.
# - log_dir: Base directory for all log files (structure: log_dir/experiment_group/timestamp_phase/)
# - experiment_group: Required. Experiment identifier used for:
#     - WandB group (to organize related runs)
#     - Local directory organization (all runs grouped together)
#     Example: "sac_overfit_cubby"
# - formats: List of output formats. 
#       default: "tensorboard", "wandb"
#       other options: "stdout", "csv", "log"
#       Note: MySAC logs training metrics at high frequency (every gradient step), so "stdout" is not recommended to avoid console spam.
#   * Remove "wandb" from list to disable cloud logging
# - wandb_project: WandB project name (required if "wandb" in formats)
# - wandb_entity: WandB username/team (optional, uses default from `wandb login`)
# - log_interval: episode/rollout metrics, dump cadence in episodes 
# - log_period: train/* metrics, dump cadence in number of gradient updates 
logger:
  log_dir: ./logs
  experiment_group: sac_cubbies  # Required: experiment identifier
  formats: ["tensorboard", "wandb"]
  wandb_project: rl-avoid-everything
  wandb_entity: null  # default entity
  wandb_tags: [] # tags for WandB run (phase is automatically included as tag)
  log_interval: 10
  log_period: 100
