# Data
data_dir: /workspace/datasets/ae_aristotle1_5mm_cubbies
train_trajectory_key: "global_solutions"
val_trajectory_key: "global_solutions"
num_obstacle_points: 4096
num_target_points: 128
num_workers: 0

# Robot & environment
urdf_path: /workspace/assets/panda/panda.urdf
num_robot_points: 2048
action_chunk_length: 1

# BC checkpoint (pre-trained AvoidEverything policy, for warm-start)
# bc_checkpoint_parameters are baked into the checkpoint — they must match the architecture used during training and cannot be changed independently.
# no need to change them because we are just loading the checkpoint, changing them could break the loading
bc_checkpoint_path: /workspace/checkpoints/avoid_everything_cubby.ckpt
bc_checkpoint_parameters: 
  robot_dof: 7
  point_match_loss_weight: 1
  collision_loss_weight: 5
  collision_loss_margin: 0.03
  min_lr: 1.0e-5
  max_lr: 5.0e-5
  warmup_steps: 5000
  decay_rate: null
  pc_bounds: [[-1.5, -1.5, -0.1], [1.5, 1.5, 1.5]]
  train_batch_size: 10
  disable_viz: true

# SAC / RL
freeze_bc_encoder: true  # Freeze BC encoder during initial RL training; call extractor.unfreeze() to fine-tune end-to-end
seed: 42
total_timesteps: 1000
n_eval_episodes: 10
save_path: checkpoints/sac_cubbies

# Buffer and learning configuration
buffer_size: 1000
critic_warmup_steps: 1000
batch_size: 16  # Increased from 1 to reduce gradient variance
train_freq: 1 # (1, "step")  # Update the model every ... (n, "step") or (n, "episode")
transitions_before_learn: 200  # Prefill replay buffer with transitions before learn()
prefill_deterministic: false  # Use deterministic actions during replay prefill
prefill_render: true

# SAC hyperparameters for stability with BC warm-start
entropy_coef: "0.001" # 0.01  # Low entropy to preserve BC behavior (default='auto' is too high)
log_std_init: -10 

# NOTE: log_std_init in policy_kwargs does NOT work! must be explicitly initialized after model creation. 
# Recommended log_std values for different exploration needs:
#   -20: Near-deterministic (std ≈ 2e-9) - good for BC-bootstrapped policies
#   -10: Very low noise (std ≈ 4e-5) - minimal exploration
#   -5:  Low noise (std ≈ 0.007) - gentle exploration
#   0:   Standard noise (std = 1.0) - standard SAC exploration

# --- Learning rate schedules for different training phases ---
# Supports two schedule types:
#   - constant: Fixed learning rate throughout the phase
#   - linear: Linear decay from start_lr to end_lr
# 
# Critic warmup phase (actor frozen, critic trains on BC rollouts):
critic_warmup_lr:
  type: "linear"       # "constant" or "linear"
  start_lr: 3.0e-4       # Learning rate during warmup
  end_lr: 0       # Only used if type is "linear"

# RL finetuning phase (both actor and critic train):
finetuning_actor_lr:
  type: "linear"         # "constant" or "linear"
  start_lr: 1.0e-5       # Initial learning rate
  end_lr: 0         # Final learning rate (for linear decay)

finetuning_critic_lr:
  type: "constant"       # "constant" or "linear"
  start_lr: 3.0e-5       # Learning rate during finetuning
  # end_lr: 1.0e-5       # Only used if type is "linear"

# --- Logging configuration ---
# Configures multi-format logging for training metrics.
# - log_dir: Base directory for all log files
# - run_name: Base name for this run (timestamp will be auto-appended)
# - formats: List of output formats. 
#       default: "tensorboard", "wandb"
#       other options: "stdout", "csv", "log"
#       Note: MySAC logs training metrics at high frequency (every gradient step), so "stdout" is not recommended to avoid console spam.
#   * Remove "wandb" from list to disable cloud logging
# - wandb_project: WandB project name (required if "wandb" in formats)
# - wandb_entity: WandB username/team (optional, uses default from `wandb login`)
logger:
  log_dir: ./logs
  run_name: sac_cubbies
  formats: ["tensorboard", "wandb"]
  wandb_project: rl-avoid-everything
  wandb_entity: null  # default entity
